name: APK bauen

# Läuft bei jedem Push und kann zusätzlich von Hand gestartet werden.
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Java 17 einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android-SDK einrichten
        uses: android-actions/setup-android@v3

      - name: Benötigte SDK-Pakete installieren
        run: yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" > /dev/null

      # Feste, mit dem Android-Plugin kompatible Gradle-Version verwenden.
      - name: Gradle 8.7 einrichten
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Web-App in die Android-Assets kopieren
        run: |
          mkdir -p android/app/src/main/assets
          cp -r public/. android/app/src/main/assets/

      - name: APK bauen (Debug)
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: APK als Download bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: richtig-lueften-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
