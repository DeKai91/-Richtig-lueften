<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1976d2" />
  <title>Richtig Lüften</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="kopf">
    <div class="kopf-inhalt">
      <h1>Richtig Lüften</h1>
      <button id="einstellungen-oeffnen" class="icon-btn" type="button" aria-label="Einstellungen">
        <!-- Zahnrad-Symbol -->
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor" aria-hidden="true">
          <path d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.03 7.03 0 0 0-1.62-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96a.5.5 0 0 0-.6.22L2.74 8.84a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32c.13.22.39.31.6.22l2.39-.96c.49.38 1.03.7 1.62.94l.36 2.54c.04.24.25.42.5.42h3.84c.25 0 .46-.18.5-.42l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.09.47 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58zM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7z"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="inhalt">
    <!-- Die drei Karten werden von app.js eingefügt. -->
    <div id="karten" class="karten"></div>

    <!-- Große Ergebniskarte. -->
    <section id="ergebnis" class="ergebnis"></section>
  </main>

  <!-- Einstellungs-Dialog -->
  <dialog id="einstellungen" class="dialog">
    <form method="dialog" class="dialog-form">
      <h2>Einstellungen</h2>

      <label class="dialog-feld">
        <span>Grün ab Differenz (g/m³)</span>
        <input id="opt-gruen" type="number" step="0.1" inputmode="decimal" />
        <small>Ab diesem Feuchte-Unterschied (innen − außen) lohnt sich Lüften deutlich.</small>
      </label>

      <label class="dialog-feld">
        <span>Rot unterhalb (g/m³)</span>
        <input id="opt-rot" type="number" step="0.1" inputmode="decimal" />
        <small>Unter diesem Wert ist es außen feuchter – nicht lüften.</small>
      </label>

      <label class="dialog-feld">
        <span>Wetterstation-ID (AWEKAS)</span>
        <input id="opt-station" type="number" step="1" inputmode="numeric" />
        <small>Aus der Stationsadresse, z. B. …/de/<strong>10833</strong>/home</small>
      </label>

      <div class="dialog-aktionen">
        <button id="einstellungen-abbrechen" class="btn btn--leise" type="button">Abbrechen</button>
        <button id="einstellungen-speichern" class="btn btn--primaer" type="submit">Speichern</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
